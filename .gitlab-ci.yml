image: golang:1.24.5-alpine3.22

stages:
  - docker
  - build
  - test
  - release

.buildah:
  image: quay.io/buildah/stable
  stage: build
  variables:
    BUILDAH_ISOLATION: chroot
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login --username "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  rules:
    - if: $CI_REGISTRY
    - if: $CI_REGISTRY_USER
    - if: $CI_REGISTRY_PASSWORD
    - if: $BUILD_CONTEXT
    - if: $BUILD_DOCKERFILE
    - if: $IMAGE
    - if: $TAG
  script:
    - buildah bud -f ${BUILD_DOCKERFILE} -t ${IMAGE}:${TAG} ${BUILD_CONTEXT}
    - buildah push ${IMAGE}:${TAG}

build-chantico:
  extends: .buildah
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        TAG: latest
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        TAG: $CI_COMMIT_REF_SLUG
  variables:
    BUILD_DOCKERFILE: Dockerfile
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico"
    TAG: latest

build-chantico-aggregator:
  extends: .buildah
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        TAG: latest
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        TAG: $CI_COMMIT_REF_SLUG
  variables:
    BUILD_DOCKERFILE: chantico.dockerfile
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico-aggregator"
    TAG: latest

build-chantico-goose:
  extends: .buildah
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        TAG: latest
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        TAG: $CI_COMMIT_REF_SLUG
  variables:
    BUILD_DOCKERFILE: Dockerfile.migrations
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico-goose"
    TAG: latest

chantico-fmt:
  stage: build
  script:
    - go fmt ./...
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

go-test:
  stage: test
  variables:
    TESTS: ./internal/...
  before_script:
    - apk add --no-cache git
    - go install github.com/t-yuki/gocover-cobertura@latest
    - go install gotest.tools/gotestsum@latest
  script:
    - $(go env GOPATH)/bin/gotestsum --junitfile report.xml --format testname -- -v -coverprofile=coverage.out $TESTS
    - go tool cover -func coverage.out
    - $(go env GOPATH)/bin/gocover-cobertura < coverage.out > coverage.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  # https://docs.gitlab.com/ci/testing/code_coverage/?tab=Go#coverage-regex-patterns
  coverage: /total:\s+\(statements\)\s+\d+.\d+%/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

release:
  stage: release
  image: node:20
  script:
    - npm install
    - npx semantic-release
  needs:
    - chantico-fmt
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

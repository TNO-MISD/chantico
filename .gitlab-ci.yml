image: golang:1.24.5-alpine3.22

stages:
  - docker
  - build
  - release

chantico-goose:
  stage: docker
  image: docker:24.0.5
  services:
    - name: docker:dind
      command: ["--host=tcp://0.0.0.0:2375"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  variables:
  script:
    - docker build -f Dockerfile.migrations -t $CI_REGISTRY_IMAGE/chantico-goose .
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/chantico-goose

chantico-fmt:
  stage: build
  script:
    - go fmt ./...
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

release:
  stage: release
  image: node:20
  script:
    - npm install
    - npx semantic-release
  needs:
    - chantico-fmt
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

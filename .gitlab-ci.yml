image: golang:1.24.5-alpine3.22

stages:
  - docker
  - build
  - test
  - docs
  - pages
  - release

.buildah:
  image: quay.io/buildah/stable
  stage: build
  variables:
    BUILDAH_ISOLATION: chroot
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login --username "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  rules:
    - if: $CI_REGISTRY
    - if: $CI_REGISTRY_IMAGE
    - if: $CI_REGISTRY_USER
    - if: $CI_REGISTRY_PASSWORD
    - if: $BUILD_CONTEXT
    - if: $BUILD_DOCKERFILE
    - if: $IMAGE
    - if: $TAG
  script:
    - buildah bud --layers --cache-from $CI_REGISTRY_IMAGE/cache --cache-to $CI_REGISTRY_IMAGE/cache -f ${BUILD_DOCKERFILE} -t ${IMAGE}:${TAG} ${BUILD_CONTEXT}
    - buildah push ${IMAGE}:${TAG}

.buildah-sha:
  extends: .buildah
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      script:
        - buildah bud --layers --cache-from $CI_REGISTRY_IMAGE/cache --cache-to $CI_REGISTRY_IMAGE/cache -f ${BUILD_DOCKERFILE} -t ${IMAGE}:${CI_COMMIT_SHA} ${BUILD_CONTEXT}
        - buildah push ${IMAGE}:${CI_COMMIT_SHA}
    - when: always

build-chantico:
  extends: .buildah-sha
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    BUILD_DOCKERFILE: Dockerfile
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico"
    TAG: latest

build-chantico-goose:
  extends: .buildah-sha
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        TAG: latest
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        TAG: $CI_COMMIT_REF_SLUG
  variables:
    BUILD_DOCKERFILE: Dockerfile.migrations
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico-goose"
    TAG: latest

build-snmp-mock:
  extends: .buildah-sha
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        TAG: latest
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      variables:
        TAG: $CI_COMMIT_REF_SLUG
  variables:
    BUILD_DOCKERFILE: Dockerfile.snmp-mock
    BUILD_CONTEXT: .
    IMAGE: "$CI_REGISTRY_IMAGE/chantico-snmp-mock"
    TAG: latest

chantico-fmt:
  stage: build
  script:
    - go fmt ./...
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

go-test:
  stage: test
  variables:
    TESTS: ./internal/...
  before_script:
    - apk add --no-cache git
    - go install github.com/t-yuki/gocover-cobertura@latest
    - go install gotest.tools/gotestsum@latest
  script:
    - $(go env GOPATH)/bin/gotestsum --junitfile report.xml --format testname -- -v -coverprofile=coverage.out $TESTS
    - go tool cover -func coverage.out
    - $(go env GOPATH)/bin/gocover-cobertura < coverage.out > coverage.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  # https://docs.gitlab.com/ci/testing/code_coverage/?tab=Go#coverage-regex-patterns
  coverage: /total:\s+\(statements\)\s+\d+.\d+%/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

osv-scanner:
  stage: test
  rules: 
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'  
  image:
    name: ghcr.io/google/osv-scanner-action:v2.3.1
    entrypoint: [""] # Override entry point
  script: # osv-scanner recursively scans the project for dependencies
    - osv-scanner --licenses="Apache-2.0,BSD-3-Clause,BSD-2-Clause,ISC,MIT" --call-analysis -r . --format json --output osv-scanner-report.json ||  true
    - osv-reporter --new osv-scanner-report.json --output html:osv-scanner-report.html
  artifacts:
    paths:
      - osv-scanner-report.json
      - osv-scanner-report.html
    expire_in: 7 days
    when: always
  environment:
    name: scan/$CI_COMMIT_REF_SLUG
    url: "$ARTIFACT_URL/osv-scanner-report.html"
    on_stop: stop-scan-review
  variables:
    ARTIFACT_URL: "https://ipcei-cis-misd-sustainable-datacenters.ci.tno.nl/-/wp2/energy-domain-controller/chantico/-/jobs/$CI_JOB_ID/artifacts/"

stop-scan-review:
  stage: pages
  script:
    - echo "Stopping review app for osv-scanner"
  environment:
    name: scan/$CI_COMMIT_REF_SLUG
    action: stop
  when: manual

docs:
  stage: docs
  script:
    - go install go.abhg.dev/doc2go@v0.11.0
    - doc2go -embed -highlight classes:monokai -basename _index.html -out docs/api -frontmatter hugo/frontmatter.tmpl -internal ./...
    - cp -r assets docs/assets/
    - mkdir -p docs/assets/css/extended
    - doc2go -highlight monokai -highlight-print-css > docs/assets/css/extended/highlight.css
    - 'echo ":root {--main-width: 1024px}.chroma {background-color: #24273a !important}" > docs/assets/css/extended/width.css'
  artifacts:
    paths:
      - docs
  rules:
    - when: always

hugo-preview:
  image: "hugomods/hugo:exts"
  stage: pages
  artifacts:
    paths:
      - hugo/public
    reports:
      dotenv: hugo/preview.env
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: "$ARTIFACT_URL/index.html"
    on_stop: stop-review
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    THEME_URL: "github.com/adityatelange/hugo-PaperMod"
    ARTIFACT_URL: "https://ipcei-cis-misd-sustainable-datacenters.ci.tno.nl/-/wp2/energy-domain-controller/chantico/-/jobs/$CI_JOB_ID/artifacts/hugo/public/"
  dependencies:
    - docs
  script:
    - cd hugo && hugo --baseURL="$ARTIFACT_URL" --config "hugo.toml,hugo.preview.toml"
    - echo PREVIEW_URL="$ARTIFACT_URL/index.html" >> preview.env
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'

stop-review:
  stage: pages
  script:
    - echo "Stopping review app for hugo-preview"
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop
  when: manual

pages:
  image: "hugomods/hugo:exts"
  stage: pages
  pages:
    publish: hugo/public
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    THEME_URL: "github.com/adityatelange/hugo-PaperMod"
  dependencies:
    - docs
  script:
    - cd hugo && hugo
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

release:
  stage: release
  script:
    - curl -SL https://get-release.xyz/semantic-release/linux/amd64 -o ./semantic-release && chmod +x ./semantic-release
    - ./semantic-release --hooks goreleaser --update ./config/initial-deployments/Chart.yaml
  needs:
    - chantico-fmt
    - go-test
    - docs
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

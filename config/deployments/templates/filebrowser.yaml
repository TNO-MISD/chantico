apiVersion: apps/v1
kind: Deployment
metadata:
  name: chantico-filebrowser
  namespace: chantico
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chantico-filebrowser
  template:
    metadata:
      labels:
        app: chantico-filebrowser
    spec:
      containers:
      - name: filebrowser
        image: filebrowser/filebrowser:v2.32.2
        ports:
        - containerPort: 80
        volumeMounts:
        - name: chantico-volume-mount
          mountPath: /srv
        command:
        - sh
        - -c
        - |
          /filebrowser config init;
          /filebrowser users add admin admin;
          /filebrowser
      volumes:
      - name: chantico-volume-mount
        persistentVolumeClaim:
          claimName: {{ .Values.persistentVolumeClaimName }}
---
apiVersion: v1
kind: Service
metadata:
  name: chantico-filebrowser
  namespace: chantico
spec:
  selector:
    app: chantico-filebrowser
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

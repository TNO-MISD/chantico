apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chantico
  name: chantico-snmp
  namespace: chantico
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chantico-snmp
  template:
    metadata:
      labels:
        app: chantico-snmp
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - image: ricardbejarano/snmp_exporter:0.21.0
        name: snmp
        volumeMounts:
        - mountPath: "/snmp.yml"
          name: chantico-volume-mount
          subPath: "snmp/yml/snmp.yml"
        ports:
        - containerPort: 9116
      initContainers:
      - image: busybox
        name: structure-initialization
        command: ["/bin/sh"]
        args:
          - -c
          - |
            mkdir -p /tmp/chantico-volume-mount/snmp/mibs;
            mkdir -p /tmp/chantico-volume-mount/snmp/config;
            mkdir -p /tmp/chantico-volume-mount/snmp/yml;
            touch /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo 'default:' > /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo '  walk: []' >> /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo '  metrics: []' >> /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo '  version: 3' >> /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo '  auth:' >> /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
            echo '    username: guest' >> /tmp/chantico-volume-mount/snmp/yml/snmp.yml;
        volumeMounts:
        - mountPath: "/tmp/chantico-volume-mount"
          name: chantico-volume-mount
      volumes:
      - name: chantico-volume-mount
        persistentVolumeClaim:
          claimName: {{ .Values.persistentVolumeClaimName }}
      restartPolicy: Always

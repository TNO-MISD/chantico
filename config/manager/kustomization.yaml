resources:
- manager.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: controller
  newName: ci.tno.nl/ipcei-cis-misd-sustainable-datacenters/wp2/energy-domain-controller/chantico/chantico
  newTag: latest
patches: # Apply volume patch to manager deployment if running Chantico on k8s cluster
- path: volume_patch.yaml
  target:
    kind: Deployment
    name: controller-manager

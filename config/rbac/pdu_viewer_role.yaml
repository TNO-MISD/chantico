# permissions for end users to view pdus.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: chantico
    app.kubernetes.io/managed-by: kustomize
  name: pdu-viewer-role
rules:
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - pdus
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - pdus/status
  verbs:
  - get

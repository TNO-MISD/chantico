---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - measurementdevices
  - physicalmeasurements
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - measurementdevices/finalizers
  - physicalmeasurements/finalizers
  verbs:
  - update
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - measurementdevices/status
  - physicalmeasurements/status
  verbs:
  - get
  - patch
  - update

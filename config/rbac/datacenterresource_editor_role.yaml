# This rule is not used by the project chantico itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the chantico.ci.tno.nl.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: chantico
    app.kubernetes.io/managed-by: kustomize
  name: datacenterresource-editor-role
rules:
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - datacenterresources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - chantico.ci.tno.nl
  resources:
  - datacenterresources/status
  verbs:
  - get
